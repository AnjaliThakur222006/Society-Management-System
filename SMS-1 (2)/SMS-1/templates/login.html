{% extends "base.html" %}

{% block title %}Login - Smart Society{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center">
                    <h3>Login to Smart Society</h3>
                </div>
                <div class="card-body">
                    {% if request.args.get('error') %}
                    <div class="alert alert-danger" role="alert">
                        {{ request.args.get('error') }}
                    </div>
                    {% endif %}
                    
                    <form id="loginForm" action="{{ url_for('authenticate') }}" method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email or Flat Number</label>
                            <input type="text" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Login</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-3">
                        <a href="{{ url_for('register') }}">Don't have an account? Register</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Add client-side validation to login form
document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');
    
    if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            
            // Reset previous error states
            emailInput.classList.remove('is-invalid');
            passwordInput.classList.remove('is-invalid');
            
            // Check if fields are empty
            let hasErrors = false;
            
            if (!emailInput.value.trim()) {
                emailInput.classList.add('is-invalid');
                hasErrors = true;
            }
            
            if (!passwordInput.value.trim()) {
                passwordInput.classList.add('is-invalid');
                hasErrors = true;
            }
            
            if (hasErrors) {
                e.preventDefault();
                showNotification('Please fill in all required fields', 'warning');
                
                // Add event listeners to clear error states when user focuses on fields
                emailInput.addEventListener('focus', function() {
                    this.classList.remove('is-invalid');
                }, {once: true});
                
                passwordInput.addEventListener('focus', function() {
                    this.classList.remove('is-invalid');
                }, {once: true});
            }
        });
    }
    
    // Function to show notifications
    function showNotification(message, type) {
        // Remove existing alerts
        const existingAlerts = document.querySelectorAll('.alert.alert-danger');
        existingAlerts.forEach(alert => alert.remove());
        
        // Create new alert if none exists
        if (document.querySelector('.alert') === null) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.role = 'alert';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            
            const cardBody = document.querySelector('.card-body');
            cardBody.insertBefore(alertDiv, cardBody.firstChild);
        }
    }
});
</script>
{% endblock %}
