{% extends "base.html" %}

{% block title %}Settings - Admin Dashboard{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4">Society Settings</h2>
        </div>
    </div>
    
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Society Information</h5>
                </div>
                <div class="card-body">
                    <form id="settingsForm">
                        <div class="mb-3">
                            <label for="societyName" class="form-label">Society Name *</label>
                            <input type="text" class="form-control" id="societyName" name="society_name" value="{{ settings.society_name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="societyAddress" class="form-label">Society Address *</label>
                            <textarea class="form-control" id="societyAddress" name="society_address" rows="3" required>{{ settings.society_address }}</textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="societyPhone" class="form-label">Contact Phone</label>
                                <input type="text" class="form-control" id="societyPhone" name="society_phone" value="{{ settings.society_phone }}">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="societyEmail" class="form-label">Contact Email</label>
                                <input type="email" class="form-control" id="societyEmail" name="society_email" value="{{ settings.society_email }}">
                            </div>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" id="saveSettingsBtn">
                                <i class="fas fa-save"></i> Save Settings
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Handle form submission
    const settingsForm = document.getElementById('settingsForm');
    const saveBtn = document.getElementById('saveSettingsBtn');
    
    if (settingsForm) {
        settingsForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form data
            const formData = new FormData(settingsForm);
            
            // Disable button and show loading state
            saveBtn.disabled = true;
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            
            // Send data to server
            fetch('/admin/settings/update', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification(data.message || 'Settings saved successfully', 'success');
                } else {
                    showNotification(data.message || 'Failed to save settings', 'danger');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showNotification('An error occurred while saving settings', 'danger');
            })
            .finally(() => {
                // Re-enable button
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
            });
        });
    }
    
    speakMessage('Society settings page loaded. You can update your society information here.');
});
</script>
{% endblock %}
