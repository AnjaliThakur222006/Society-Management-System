{% extends "base.html" %}

{% block title %}User Profile - Smart Society{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">User Profile</h3>
                </div>
                <div class="card-body">
                    <form id="profileForm" enctype="multipart/form-data">
                        <div class="text-center mb-4">
                            <div class="position-relative d-inline-block">
                                <img src="{{ url_for('static', filename='uploads/profiles/' + user.profile_pic) }}" 
                                     alt="Profile Picture" 
                                     class="rounded-circle" 
                                     style="width: 150px; height: 150px; object-fit: cover;" 
                                     id="profilePicPreview">
                                <label for="profile_pic" class="position-absolute bottom-0 end-0">
                                    <i class="fas fa-camera bg-primary text-white rounded-circle p-2" style="cursor: pointer;"></i>
                                </label>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ user.name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" name="phone" value="{{ user.phone }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="profile_pic" class="form-label">Change Profile Picture</label>
                            <input type="file" class="form-control" id="profile_pic" name="profile_pic" accept="image/*">
                            <div class="form-text">Upload a new profile picture (JPG, PNG, GIF)</div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">Update Profile</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Preview selected profile picture
    document.getElementById('profile_pic').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('profilePicPreview').src = event.target.result;
            }
            reader.readAsDataURL(file);
        }
    });
    
    // Update profile form submission
    document.getElementById('profileForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        
        fetch('/profile/update', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                showNotification(result.message, 'success');
            } else {
                showNotification(result.message, 'danger');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            showNotification('Profile update failed. Please try again.', 'danger');
        });
    });
    
    // Function to show notifications
    function showNotification(message, type) {
        // Remove existing notifications
        const existingAlerts = document.querySelectorAll('.notification-alert');
        existingAlerts.forEach(alert => alert.remove());
        
        // Create new alert
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert alert-${type} alert-dismissible fade show notification-alert position-fixed`;
        alertDiv.style.top = '20px';
        alertDiv.style.right = '20px';
        alertDiv.style.zIndex = '9999';
        alertDiv.innerHTML = `
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        `;
        
        document.body.appendChild(alertDiv);
        
        // Auto remove after 5 seconds
        setTimeout(() => {
            if (alertDiv.parentNode) {
                alertDiv.remove();
            }
        }, 5000);
    }
});
</script>
{% endblock %}
