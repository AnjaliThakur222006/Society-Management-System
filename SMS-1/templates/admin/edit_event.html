{% extends "base.html" %}

{% block title %}Edit Event - Admin Dashboard{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h3 class="mb-0">Edit Event</h3>
                </div>
                <div class="card-body">
                    <form id="editEventForm" method="POST" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="title" class="form-label">Event Title *</label>
                                    <input type="text" class="form-control" id="title" name="title" value="{{ event['title'] }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="event_type" class="form-label">Event Type *</label>
                                    <select class="form-select" id="event_type" name="event_type" required>
                                        <option value="">Select Type</option>
                                        <option value="Cultural" {% if event['event_type'] == 'Cultural' %}selected{% endif %}>Cultural</option>
                                        <option value="Meeting" {% if event['event_type'] == 'Meeting' %}selected{% endif %}>Meeting</option>
                                        <option value="Festival" {% if event['event_type'] == 'Festival' %}selected{% endif %}>Festival</option>
                                        <option value="Sports" {% if event['event_type'] == 'Sports' %}selected{% endif %}>Sports</option>
                                        <option value="Charity" {% if event['event_type'] == 'Charity' %}selected{% endif %}>Charity</option>
                                        <option value="Other" {% if event['event_type'] == 'Other' %}selected{% endif %}>Other</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="date" class="form-label">Date *</label>
                                    <input type="date" class="form-control" id="date" name="date" value="{{ event['event_date'] }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="time" class="form-label">Time *</label>
                                    <input type="time" class="form-control" id="time" name="time" value="{{ event['event_time'] }}" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="venue" class="form-label">Venue *</label>
                            <input type="text" class="form-control" id="venue" name="venue" value="{{ event['venue'] }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description *</label>
                            <textarea class="form-control" id="description" name="description" rows="4" required>{{ event['description'] }}</textarea>
                        </div>
                        
                        {% if event['image'] %}
                        <div class="mb-3">
                            <label class="form-label">Current Image</label>
                            <div class="mb-2">
                                <img src="{{ url_for('static', filename='images/events/' + event['image']) }}" 
                                     alt="Current Event Image" 
                                     class="img-thumbnail" 
                                     style="max-width: 200px; max-height: 200px;">
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="deleteImage" name="delete_image">
                                <label class="form-check-label" for="deleteImage">
                                    Delete current image
                                </label>
                            </div>
                        </div>
                        {% endif %}
                        
                        <div class="mb-3">
                            <label for="image" class="form-label">New Event Image</label>
                            <input type="file" class="form-control" id="image" name="image" accept="image/*">
                            <div class="form-text">Upload a new image for the event (optional)</div>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('admin_events') }}" class="btn btn-secondary me-md-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Event</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('editEventForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    
    // Validate required fields
    const title = document.getElementById('title').value.trim();
    const date = document.getElementById('date').value.trim();
    const time = document.getElementById('time').value.trim();
    const venue = document.getElementById('venue').value.trim();
    const description = document.getElementById('description').value.trim();
    
    if (!title || !date || !time || !venue || !description) {
        showNotification('All fields marked with * are required', 'warning');
        return;
    }
    
    fetch(window.location.href, {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showNotification(data.message, 'success');
            setTimeout(() => {
                window.location.href = '/admin/events';
            }, 1500);
        } else {
            showNotification(data.message, 'danger');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showNotification('Failed to update event. Please try again.', 'danger');
    });
});

// Function to show notifications
function showNotification(message, type) {
    // Remove existing notifications
    const existingAlerts = document.querySelectorAll('.notification-alert');
    existingAlerts.forEach(alert => alert.remove());

    // Create new alert
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type} alert-dismissible fade show notification-alert position-fixed`;
    alertDiv.style.top = '20px';
    alertDiv.style.right = '20px';
    alertDiv.style.zIndex = '9999';
    alertDiv.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    `;

    document.body.appendChild(alertDiv);

    // Auto remove after 5 seconds
    setTimeout(() => {
        if (alertDiv.parentNode) {
            alertDiv.remove();
        }
    }, 5000);
}
</script>
{% endblock %}
